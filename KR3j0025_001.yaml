body:
  text: 卷上輿服第一大駕指南車起於黃帝帝與蚩尤戰於涿漉之野蚩尤作大霧士皆迷四方於是作指南車以示四方遂擒蚩尤而即帝位故後常建焉大駕指南車舊說周公所作也周公治致太平越裳氏重譯來獻白雉一黑雉一象牙一使者迷其歸路周公錫以文錦二匹軿車五乘皆為司南之製越裳氏載之以南緣扶南林邑海際朞年而至其國使大夫將送至國而旋亦乘司南而背其所指亦朞年而還至始製車轄轊皆以鐵及還至鐵亦銷盡以屬巾車氏收而載之常為先導示服遠人而正四方也車法具在尚方故事漢末喪亂其法中絶馬先生紹而作焉今指南車是其遺法也馬鈞曹魏時人大章車所以識道里也起於西京亦曰記里車車上為二層皆有木人行一里下層擊鼓行十里上層擊鐲尚方故事有作車法辟惡車秦制也桃弓葦矢所以祓除不祥豹尾車周制也所以象君子豹變尾言謙也古軍正建之今唯乘輿得建之金斧黃鉞也鐵斧玄鉞也三代通相用之斷斬黃鉞乘輿建之以純金為飾玄鉞諸侯王公得建之武王以黃鉞斬紂頭故王者以為戒太公以玄鉞斬妲己故婦人以為戒漢制諸公亦建玄鉞以太公乘之助武王斷斬故為公之飾焉大將軍出征特加黃鉞者以銅為之以黃金塗刃及柄不得純金也得賜黃鉞則斬持節諸侯王公建之鍠秦改鐵鉞作鍠秦制也今乘輿諸侯王公妃主通建焉麾所以指麾武王執白旄以麾是也乘輿以黃諸公以朱刺史二千石以纁五輅衡上金爵者朱雀也口銜鈴鈴謂鑾所謂和鑾也禮記云行前朱鳥鸞也前有鸞鳥故謂之鸞鸞口銜鈴故謂之鑾鈴或為鑾或為鸞事一而義異也車輻棒也漢朝執金吾金吾亦棒也以銅為之黃金塗兩末謂為金吾御史大夫司隸校尉亦得執焉御史校尉郡守都尉縣長之類皆以木為吾焉用以夾車故謂之車輻一曰形似輻故謂之車輻也棨戟殳之遺象也詩所謂伯也執殳為王前驅殳前驅之器也以木為之後世滋僞無復典刑以赤油韜之亦謂之油戟亦謂之棨戟王公以下通用之以前驅信幡古之徽號也所以題表官號以為符信故謂信幡乘輿則畫為白虎取其義而有威信之德也魏朝有青龍幡朱鳥幡玄武幡白虎幡黃龍幡五以詔四方東方郡國以青龍幡南方郡國以朱鳥幡西方郡國以白虎幡北方郡國以玄武幡朝廷畿內以黃龍幡亦以騏驎幡高貴鄉公討晉文王自秉黃龍幡以麾是也今晉朝唯用白虎幡信幡用鳥書取其飛騰輕疾也一曰以鴻雁燕鳦者去來之信也重耳古重較也文官青耳武官赤耳或曰重較在軍車藩上重起如牛角故云重較耳唱上所以促行徒也上鼓而行節也伺風鳥夏禹所作也帢魏武帝所制初以章身服之輕便又作五色帢以表方面也白筆古珥筆示君子有文武之備焉兩漢京兆河南尹及執金吾司隸校尉皆使人導引傳呼使行者止坐者起四人皆持角弓違者則射之有乘高窺闞者亦射之魏晉設角弩而不用曲蓋太公所作武王伐紂大風折蓋太公因折蓋之形而制曲蓋焉戰國嘗以賜將帥自漢乘輿用四謂為䡶輗蓋有軍號者賜一焉雉尾扇起於殷世高宗有雊雉之祥服章多用翟羽周制以為王后夫人之車服輿輦有翣即緝雉羽為扇翣以障翳風塵也漢朝乘輿服之後以賜梁孝王魏晉以來用為常准諸王皆得用之障扇長扇也漢世多豪俠象雉尾而製長扇也金根車秦製也秦并天下閲三代之輿服謂殷得瑞山車一曰金根故因作為金根之車秦乃增飾而乘御漢因不改焉漢舊制乘輿黃赤綬四采黃赤紺縹淳黃圭長二丈九尺九寸五百首太皇太后皇太后皇后皆與乘輿同諸侯王赤綬四采赤黃縹紺淳赤圭長二丈一尺三百首長公主天子貴人與諸侯王同綬者特加也諸國貴人相國皆緑綬三采緑紫紺淳緑圭長二丈一尺二百四十首公侯將軍紫綬二采紫白淳紫圭長丈七尺百八十首公主封君服紫綬九卿中二千石二千石青綬三采青白紅淳青圭長丈七尺百二十首自青綬以上縌皆長三尺二寸與綬同采而首半之千石六百石黑綬三采青赤紺淳青圭長丈六尺八十首四百石三百石長同四百石三百石二百石黃綬一采淳黃圭長丈五尺六十首自黑綬以下縌綬皆長三尺與綬同采而首半之百石青紺綸一采宛轉繆織圭長丈二尺凡先合單紡為一絲四絲為一扶五扶為一首五首成一文文采淳為一圭皆廣一尺六寸也首多者絲細首少者絲粗縌者古佩璲也佩綬相迎受故曰縌紫綬以上縌綬之間得施玉環鐍云玉佩之法漢末喪亂絶而不傳魏侍中王粲識古佩法更而製焉攘衣廝徒之服也取其便於取用乘輿進食者服攘衣前漢董偃緑幘青韝加攘衣以見武帝廚人之服也五伯一伍之伯也五人曰伍五長為伯一曰戶伯漢制兵吏五人一戶竈置一伯故戶伯亦曰火伯以為一竈之主也漢諸公行則戶伯率其伍以導引也古兵士服韋辨今戶伯服赤幘纁衣素韎辨之遺法也警蹕所以戒行徒也周禮蹕而不警秦制出警入蹕謂出軍者皆警戒入國者皆蹕止也至漢朝梁孝王王出稱警入稱蹕降天子一等焉一曰蹕路也謂行者皆警於塗路也華蓋黃帝所作與蚩尤戰於涿漉之野常有五色雲氣金枝玉葉止於帝上有花葩之象故因而作華蓋也貂蟬胡服也貂者取其有文采而不炳煥外柔易而內剛徑也蟬取其清虛識變也在位者有文而不自耀有武而不示人清虛自牧識時而動也青囊所以盛印也奏劾者則以青布囊盛印於前示奉王法而行也非奏劾日則以青繒為囊盛印於後也謂劾尚質直故用布非奏劾者尚文明故用繒自晉朝以來劾奏之官專以印居前非劾奏之官專以印居後文官冠進賢冠古委貌冠之遺象也武官冠惠文冠古緇布冠之遺象也緇布冠上古之法武人質木故取法焉舄以木置履下乾臘不畏泥濕也天子赤舄凡舄色皆象於裳履屨之不帶者不借草履也以其輕賤易得故人人自有不假借也漢文履不借以視朝是也五明扇舜作也既受堯禪廣開視聽求賢人以自輔故作五明扇也漢公卿士大夫皆得用之晉非乘輿不得用也孫文基獲青玉馬鞍其光照衢漢世傳高祖斬白蛇劍長七尺高祖自稱提三尺劍而取天下有客問於豫豫告之曰高祖為泗水亭長送徒驪山所提劍理當三尺耳後富貴當別得七尺寶劍捨舊而佩之後世唯聞高祖以佩劍斬白蛇而高祖常佩此劍便謂此劍即斬蛇之劍也吳大帝有寶刀三寶劍六寶劍六一曰白蛇二曰紫電三曰辟邪四曰流星五曰青冥六曰百里寶刀三一曰百鍊二曰青犢三曰漏影都邑第二封疆畫界者封土為臺以表識疆境畫界者於二封之間又為匱埒以畫分界域也闤者市之垣也闠者市之門也肆所以陳貨鬻之物也肆陳也店所以置貨鬻之物也店置也長安御溝謂之楊溝謂植高楊於其上也又曰羊溝謂羊喜能觸牆垣故為溝以隔之故曰羊溝枸欄漢成帝顧成廟有三玉鼎二真金罏槐樹悉為扶老枸欄畫飛雲龍角虛於其上廟者貌也所以髣佛先人之靈貌也罘罳屏之遺象也孰門外之舍也臣來朝君至門外當就舍更衣熟詳所應對之事孰之言熟也行至門內屏外復應思惟罘罳言復思也漢西京罘罳合版為之亦築土為之每門闕殿舍前皆有焉于今郡國廳前亦樹之城門皆築土為之纍土曰臺亦謂之臺門也闕觀也古每門樹兩觀於其前所以標表宮門也其上可居登之則可遠觀故謂之觀人臣將朝至此則思其所闕多少故謂之闕其上皆丹堊其下皆畫雲氣仙靈奇禽怪獸以昭示四方焉蒼龍闕畫蒼龍白虎闕畫白虎玄武闕畫玄武朱雀闕上有朱雀二枚城者盛也所以盛受人物也隍城池之無水者也秦所築長城土色皆紫漢亦然故云紫塞也塞者塞也所以擁塞夷狄也南方徼色赤故謂之丹徼徼繞也所以繞逆蠻夷使不得侵入中國也
