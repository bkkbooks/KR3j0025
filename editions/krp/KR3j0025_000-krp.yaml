body:
  text: 晉太傅丞崔豹字正熊輿服第一大駕指南車起於黃帝帝與蚩尤戰於涿漉之野蚩尤作大霧士皆迷四方於是作指南車以示四方遂擒蚩尤而卽帝位故後常建焉大駕指南車舊說周公所作也周公治致太平越裳氏重譯來獻白雉一黑雉一象牙一使者迷其歸路周公錫以文錦二疋軿車五乗皆爲司南之製越裳氏載之以南緣扶南林邑海際朞年而至其國使大夫將送至國而旋亦乗司南而背其所指亦朞年而還至始製車轄轊皆以鐵及還至鐵亦銷盡以屬巾車氏收而載之常爲先導示服逺人而正四方也車灋具在尚方故事漢末喪亂其灋中絕馬先生紹而作焉今指南車是其遺灋也馬鈞曹魏時人大章車所以識道里也起於西京亦曰記里車車上爲二層皆有木人行一里下層擊鼓行十里上層擊鐲尚方故事有作車灋辟惡車秦制也桃弓葦矢所以祓除不祥豹尾車周制也所以象君子豹變尾言謙也古軍正建之今唯乗輿得建之金斧黃鉞也鐵斧玄鉞也三代通相用之斷斬黃鉞乗輿建之以純金爲飾玄鉞諸侯王公得建之武王以黃鉞斬紂頭故王者以爲戒太公以玄鉞斬妲已故婦人以爲戒漢制諸公亦建玄鉞以太公秉之助武王斷斬故爲公之飾焉大將軍岀征特加黃鉞者以銅爲之以黃金塗刃及柄不得純金也得賜黃鉞則斬持節諸侯王公建之鍠秦改鐵鉞作鍠秦制也今乗輿諸侯王公妃主通建焉麾所以指麾武王執白旄以麾是也乗輿以黃諸公以朱刺史二千石以纁五輅衡上金爵者朱雀也口銜鈴鈴謂鑾所謂和鑾也禮記云行前朱鳥鸞也前有鸞鳥故謂之鸞鸞口銜鈴故謂之鑾鈴或爲鑾或爲鸞事一而義異也車輻棒也漢朝執金吾金吾亦棒也以銅爲之黄金塗两末謂爲金吾御史大夫司隷校尉亦得執焉御史校尉郡守都尉縣長之類皆以木爲吾焉用以夾車故謂之車輻一曰形似輻故謂之車輻也棨㦸殳之遺象也詩所謂伯也執殳爲王前驅殳前驅之噐也以木爲之後世滋僞無復典刑以赤油韜之亦謂之油㦸亦謂之棨㦸王公以下通用之以前驅信幡古之徽號也所以題表官號以爲符信故謂信幡乗輿則畫爲白虎取其義而有威信之徳也魏朝有青龍幡朱鳥幡玄武幡白虎幡黄龍幡五以詔四方東方郡國以青龍幡南方郡國以朱鳥幡西方郡國以白虎幡北方郡國以玄武幡朝廷畿内以黄龍幡亦以騏驎幡高貴鄉公討晉文王自秉黄龍幡以麾是也今晉朝唯用白虎幡信幡用鳥書取其飛騰輕疾也一曰以鴻雁燕鳦者去來之信也重耳古重較也文官青耳武官赤耳或曰重較在軍車藩上重起如牛角故云重較耳唱上所以促行徒也上鼓而行節也伺風鳥夏禹所作也巾夾魏武帝所制初以章身服之輕便又作五色􆄳以表方面也白筆古珥筆示君子有文武之偹焉两漢京兆河南尹及執金吾司隷校尉皆使人導引傳呼使行者止坐者起四人皆持角弓違者則射之有乗高窺闞者亦射之魏晉設角弩而不用曲蓋太公所作武王伐紂大風折蓋太公因折蓋之形而制曲蓋焉戰國嘗以賜將帥自漢乗輿用四謂爲䡶輗蓋有軍號者賜一焉雉尾扇起於殷世高宗有雊雉之祥服章多用翟羽周制以爲王后夫人之車服輿輦有翣卽緝雉羽爲扇翣以障翳風塵也漢朝乗輿服之後以賜梁孝王魏晉以來用爲常准諸王皆得用之障扇長扇也漢世多豪俠象雉尾而製長扇也金根車秦製也秦并天下閱三代之輿服謂殷得瑞山車一曰金根故因作爲金根之車秦乃増飾而乗御漢因不改焉漢舊制乗輿黃赤綬四采黃赤紺縹淳黃圭長二丈九尺九寸五百首太皇太后皇太后皇后皆與乗輿同諸侯王赤綬四采赤黃縹紺淳赤圭長二丈一尺三百首長公主天子貴人與諸侯王同綬者特加也諸國貴人相國皆綠綬三采綠紫紺淳綠圭長二丈一尺二百四十首公侯將軍紫綬二采紫白淳紫圭長丈七尺百八十首公主封君服紫綬九卿中二千石二千石靑綬三采靑白紅淳靑圭長丈七尺百二十首自靑綬以上縌皆長三尺二寸與綬同采而首半之千石六百石黑綬三采靑赤紺淳靑圭長丈六尺八十首四百石三百石長同四百石三百石二百石黃綬一采淳黃圭長丈五尺六十首自黑綬以下縌綬皆長三尺與綬同采而首半之百石靑紺綸一采宛轉繆織圭長丈二尺凢先合單紡爲一絲四絲爲一扶五扶爲一首五首成一文文采淳爲一圭皆廣一尺六寸也首多者絲細首少者絲麤縌者古佩璲也佩綬相迎受故曰縌紫綬以上縌綬之間得施玉環鐍云玉佩之灋漢末喪亂絶而不傳魏侍中王粲識古佩灋更而製焉攘衣厮徒之服也取其便於取用乗輿進食者服攘衣前漢董偃綠幘靑韝加攘衣以見武帝㕑人之服也五伯一伍之伯也五人曰伍五長爲伯一曰戸伯漢制兵吏五人一戸竈置一伯故户伯亦曰火伯以爲一竈之主也漢諸公行則戸伯率其伍以導引也古兵士服韋弁今户伯服赤幘纁衣素韎弁之遺法也警蹕所以戒行徒也周禮蹕而不警秦制岀警入蹕謂岀軍者皆警戒入國者皆蹕止也至漢朝梁孝王王岀稱警入稱蹕降天子一等焉一曰蹕路也謂行者皆警於塗路也華盖黄帝所作與蚩尤戰於涿漉之野常有五色雲氣金枝玉葉止於帝上有花葩之象故因而作華盖也貂蟬胡服也貂者取其有文采而不炳煥外柔易而内剛勁也蟬取其清虗識變也在位者有文而不自耀有武而不示人清虗自牧識時而動也青嚢所以盛印也奏劾者則以青布嚢盛印於前示奉王法而行也非奏劾日則以靑繒爲囊盛印於後也謂劾尚質直故用布非奏劾者尚文明故用繒自晉朝以來劾奏之官專以印居前非劾奏之官專以印居後文官冠進賢冠古委貌冠之遺象也武官冠惠文冠古緇布冠之遺象也緇布冠上古之法武人質木故取法焉舄以木置履下乾腊不畏泥濕也天子赤舄凢舄色皆象於裳履屨之不帶者不借草履也以其輕賤易得故人人自有不假借也漢文履不借以視朝是也五明扇舜作也旣受堯禪廣開視聽求賢人以自輔故作五明扇也漢公卿士大夫皆得用之晉非乘輿不得用也孫文基獲靑玉馬鞍其光照衢漢世傳高祖斬白蛇劒長七尺高祖自稱提三尺劒而取天下有客問於予予吿之曰高祖爲泗水亭長送徒驪山所提劒理當三尺耳後富貴當別得七尺寶劒捨舊而佩之後世唯聞高祖以佩劒斬白蛇而髙祖常佩此劒便謂此劒卽斬蛇之劒也吳大帝有寶刀三寶劒六寶劒六一曰白蛇二曰紫電三曰辟邪四曰流星五曰靑㝠六曰百里寶刀三一曰百鍊二曰靑犢三曰漏影都邑第二封疆畫界者封土爲臺以表識疆境畫界者於二封之間又爲㙺埒以畫分界域也闤者市之垣也闠者市之門也肆所以陳貨鬻之物也肆陳也店所以置貨鬻之物也店置也長安御溝謂之楊溝謂植高楊於其上也又曰羊溝謂羊喜能觸牆垣故爲溝以隔之故曰羊溝枸欄漢成帝顧成廟有三玉鼎二眞金罏槐樹悉爲扶老枸欄畫飛雲龍角虛於其上廟者貌也所以髣髴先人之靈貌也罘愚屏之遺象也塾門外之舎也臣來朝君至門外當就舎更衣熟詳所應對之事塾之言熟也行至門内屏外復應思惟罘罳言復思也漢西京罘罳合版爲之亦築土爲之毎門闕殿舎前皆有焉于今郡國廳前亦樹之城門皆築土爲之累土曰臺亦謂之臺門也闕觀也古毎門樹兩觀於其前所以標表宮門也其上可居登之則可逺觀故謂之觀人臣將朝至此則思其所闕多少故謂之闕其上皆丹堊其下皆畵雲氣仙靈竒禽怪獸以昭示四方焉蒼龍闕畵蒼龍白虎闕畫白虎玄武闕畫玄武朱雀闕上有朱雀二枚城者盛也所以盛受人物也隍城池之無水者也秦所築長城土色皆紫漢亦然故云紫塞也塞者塞也所以擁塞夷狄也南方徼色赤故謂之丹徼徼繞也所以繞逆蠻夷使不得侵入中國也古今註上古今註下晉太傅丞崔豹字正熊草木第六甘實形如石橊者謂之壷甘山中有木葉似豫章皮多癬皴名爲六駁白楊葉圓青楊葉長桺葉細長栘楊圓葉弱蔕微風大揺一名高飛一名獨摇蒲柳水邊生葉似青楊亦曰蒲楊栘蒲一曰栘桺亦曰栘楊水楊蒲楊也枝勁細紉任矢用赤楊霜降則葉赤材理亦赤合歡樹似梧桐枝弱葉繁互相交結每一風來輒自相解了不相絆綴樹之階庭使人不忿嵇康種之舎前杜仲皮中有絲折之則見木蜜生南方合體皆甜軟皮及葉皆可生啗味如蜜解煩止渇其老枝及根幹堅又可食細碎煮之以爲蜜味倍甘美糯棗葉如柿實似柿而小味亦甘美蘇方木出扶南林邑外國取細碎煑之以染瑿木出交州林邑色黑而有文亦謂之文木紫栴木出扶南而色紫亦曰紫檀䝁豆葉似葛實長尺餘可蒸食一名䝁斗貍豆一名貍沙一名獵渉葉似葛而藤大實大如李核可煼食虎豆一名虎沙似貍豆而大實如小兒拳亦可食馬豆一名馬沙似虎豆而枯亦可食荆葵一名茙葵一名芘芣似木槿而光色奪目有紅有紫有靑有白有黃莖葉不殊但花色有異耳一曰蜀葵芙蓉一名荷花生池澤中實曰蓮花之最秀異者一名水目一名水芝一名水華色有紅白靑黃紅白二色荖多花大者至百葉芡雞頭也一名雁頭一名芰葉似荷而大葉上蹙皺如沸實有芒刺其中如米可以度饑萬連葉如鳥翅一名鳥羽一名鳯翼花大者其色多紅綠紅者𬗋點綠者紺點俗呼爲仙人花一名連纈花酒杯藤岀西域藤大如臂葉似葛花實如梧桐實花堅皆可以酌酒自有文章暎徹可愛實大如指味如荳􅛌香美消酒土人提酒至藤下摘花酌酒仍以實消酲國人寳之不傳中土張騫至大宛得之􅃮樹以剛斧斫其皮開以竹管承之汁滴管中即成漆也烏孫國有青田核莫測其樹實之形至中國者但得其核耳核大如六升瓠空之以盛水俄而成酒味甚醇美劉章得两核集賔客設之常供二十人之飲一核盡一核所盛復飲飲盡隨更注水隨盡隨盛不可乆置乆置則苦不可飲名曰靑田酒枳椇子一名樹蜜一名木餳實形卷曲核在實外味甘美如餳蜜一名白石一名木實一名枳椇棘實曰棗􅎚實曰䂊樟桑實曰椹柘實曰佳匏瓠也壷盧瓠之無柄者也瓠有柄者曰懸瓠可爲笙曲沃者尤善秋乃可用用則漆其裏瓢亦瓠也瓠其緫瓢其别也空室中無人行則生苔蘚或紫或靑名曰圓蘚又曰緑蘚亦曰緑錢稻之黏者爲秫禾之黏者爲黍亦謂之穄亦曰黃黍九糓者黍稷稻粱三豆二麥是也荼蓼也荼紫色蓼靑色其味辛且苦食之明目或謂紫葉者爲香荼或謂靑葦者爲靑荼亦以紫色者爲紫蓼靑色者爲靑蓼其長大而不苦者爲馬蓼蒜卯蒜也俗謂之爲小蒜胡國子有蒜十許子共一株二籜幕裹之爲名胡蒜尤辛於小蒜俗亦呼之爲大蒜揚州土人謂蒻爲斑杖不知食之荆州人謂爲蕺蘘荷似苴而白苴色紫花生根中花未散時可食乆置則銷爛不爲實矣葉似薑宜隂翳地種之燕支葉似葪花似捕公出西方土人以染名爲燕支中國亦謂爲紅藍以染粉爲婦人色謂爲燕支粉今人以重絳爲胭肢非燕支花所染也燕支花自爲紅藍耳舊謂赤白之間爲紅卽今所謂紅藍也苦葴一名苦子有裹形如皮弁始生靑熟則赤裹正圓如珠子亦隨裹靑赤長安兒童謂爲洛神珠亦曰王母珠亦曰皮弁草沈釀者漢鄭弘爲靈帝文鄕嗇夫行官京洛未至宿一埭埭名沈釀於埭逢故舊友人四顧荒郊村落絶逺酤酒無處情抱不伸乃以錢投十中依評飮盡多酣暢皆得大醉因更爲沈釀川明旦分首而去羊躑躅黃花羊食即死見卽躑躅不前進雜註第七孫亮竹璢璃屏風鏤作瑞應圖凡一百二十種魏武帝以瑪瑙石爲馬勒以車渠石爲酒杯莫難珠一名木難色黃出東夷陽燧以銅爲之形如鏡照物則影倒向日則火生以艾炷之則得火長安婦人好盤桓髻到于今其灋不絶墮馬髻今無復作者緌墮髻一云墮馬之餘形也盤龍釵梁冀所製也冀婦改驚翠眉爲愁眉魏宫人好畫長眉今人多作蛾眉警鶴髻孫權名舸爲赤馬言其飛馳如馬之走陸也又以舟名馳馬曹眞有馬名驚㠶取其馳驟如烈風之㠶舉之疾也魏文帝宮人有絶所寵者有莫瓊樹薛夜來陳尚衣叚巧笑四人日夕在側瓊樹乃制蟬鬢縹緲如蟬翼故曰蟬鬢巧笑姑以錦衣絲履作紫粉拂靣尚衣能歌舞夜來善爲衣裳一時冠絶問答釋義第八程雅問董仲舒曰自古何謂稱三皇五帝對曰三皇三才也五帝五常也三王三明也五霸五嶽也牛亨問曰將離相贈之以芍藥者何也答曰芍藥一名可離故將别以贈之亦猶相招召贈以文無文無一名當歸也欲忘人之憂則贈之以丹棘丹棘一名忘其憂草使人忘其憂也欲蠲人之忿則贈之靑堂靑堂一名合懽合懽則忘忿程雅問拾櫨木一名無患者昔有神巫名曰寶一本作實眊能符劾百鬼得鬼則以此爲棒投之世人相傳以此木爲衆鬼所畏競取爲器用以却厭邪鬼故號曰無患也牛亨問曰自古有書契以來便應有筆世稱蒙恬造筆何也答曰蒙恬始造卽秦筆耳以枯木爲管鹿毛爲拄羊毫爲被所謂蒼毫非兎毫竹管也又問彤管何也曰彤者赤漆耳史官載事故以彤管用赤心記事也孫興公問曰世稱黃帝鍊丹於鑿硯山乃得仙乗龍上天羣臣援龍鬚鬚墜而生草曰龍鬚有之乎答曰無也有龍鬚草一名縉雲草故世人爲之妄傳至如今有虎鬚草江東亦織以爲席號曰西王母席可復是西王母乗虎而墮其鬚也牛亨問曰冕旒以繁露者何也答曰綴玉而下埀如繁露也程雅問曰堯設誹謗之木何也答曰今之華表木也以橫木交柱頭狀若花也形似􅥱槹大路交衢悉施焉或謂之表木以表王者納諫也亦以表識衢路也秦乃除之漢始復修焉今西京謂之交午木牛亨問曰籍者何也答曰籍者尺二竹牒記人之年名字物色縣之宮門案省相應乃得入也程雅問曰凢傳者何也答曰凢傳皆以木爲之長尺五寸書符信於上又以一版封之階封以御史印章所以爲信也如今之過所也牛亨問曰草木生類乎答曰生類也又曰有識乎答曰無識也又曰無識寧得爲生類也答曰物有生而有識者有生而無識者有不生而有識者有不生而無識者夫生而有識者蟲類也生而無識者草木也不生而無識者水土也不生而有識者鬼神也牛亨問曰蟻名玄駒者何也答曰河内人並河而見人馬數千萬皆如黍米遊動徃來從旦至暮家人以火燒之人皆是蚊蚋馬皆是大蟻故今人呼蚊蚋爲黍民名蟻曰玄駒也牛亨問曰蟬名齊女者何也答曰齊王后忿而死尸變爲蟬登庭樹嘒唳而鳴王悔恨故世名蟬曰齊女也古今註下終古今註中晉太傅丞崔豹字正熊音樂第三雉朝飛者犢木子所作也齊處士泯宣年五十無妻出薪於野見雉雌雄相隨而飛意動心悲乃作雉朝飛之操以自傷焉其聲中絶魏武帝時有盧女者故將軍隂并一本云計之子年七歳入漢宫學琴琴特鳴異於餘伎善爲新聲能傳此曲盧女至明帝崩後出嫁爲尹更生妻別鶴操髙陵牧子所作也娶妻五年而無子父兄爲之改娶妻聞之中夜起倚戸而悲嘯牧子聞之愴然而悲歌曰將乖比翼隔天端山川悠逺路漫漫㩜衾不寐食忘餐後人因以爲樂章焉走馬引樗里牧恭所作也爲父報怨殺人而亡匿於山之下有天馬夜降圍其室而鳴夜覺聞其聲以爲吏追乃犇而亡去明旦視之乃天馬跡也因惕然而悟曰吾所處之地將危乎遂荷糧而去入于沂澤中援琴而鼓之而爲天馬聲曰走馬引也武溪深馬援爲南征之所作援門生爰寄生善吹笛援作歌以和之名曰武溪深其曲曰滔滔武溪一何深鳥飛不度獸不能臨嗟哉武溪兮多毒淫淮南王淮南小山之作也王服食求仙徧禮方士遂與八公相携俱去莫知所往小山之徒思戀不巳乃作小山之曲焉箜篌引朝鮮津䘚霍里子高妻麗玉所作也高晨起刺船而濯有一白首狂夫被髪提壷亂河流而渡其妻隨而止之不及遂墮河水死於是援箜篌而鼓之作公無渡河之曲聲甚悽愴曲終自投河而死霍里子髙還以其聲語其妻麗玉玉傷之乃引箜篌而寫其聲聞者莫不墮淚飲泣焉麗玉以其曲傳鄰女麗容名之曰箜篌引吳趨曲吳人歌其地也平陵東翟義門人所作也王莽殺義義門人作歌以怨之薤露蒿里並哀歌也出田橫門人橫自殺門人傷之爲作悲歌言人命薤上露易晞滅也亦謂人死䰟魄歸于蒿里故有二章其一曰薤上朝露何易晞露晞明朝更復落人死一去何時歸其二曰蒿里誰家地聚斂精魄無賢愚鬼伯一何相催促人命不得少踟蹰至孝武時李延年乃分二章爲二曲薤露送王公貴人蒿里送士大夫庶人使挽柩者歌之世亦呼爲挽歌亦謂之長短歌言人夀命長短定分不可妄求也陌上桑出秦氏女子秦氏邯鄲人有女名羅敷爲邑人千乘王人妻王人後爲趙王家令羅敷出採桑於陌上趙王登臺見而悅之因飲酒欲奪之羅敷乃彈箏作陌上桑之歌以自明焉杞梁妻杞植妻妹朝口之所作也植戰死妻曰上則無父中則無夫下則無子人生之苦至矣乃抗聲長哭杞都城感之而頽遂投水而死其姝悲其姊之貞操乃作歌名曰𣏌梁妻焉梁植字也釣竿伯常子妻所作也伯常子避仇河濱爲漁父其妻思之每至河側作釣竿之歌後司馬相如作釣竿之詩今傳爲古曲董逃歌後漢游童所作也後漢有董卓作亂率以逃亡後人習之以爲歌章樂府奏之以爲儆戒焉短簫鐃歌軍樂也黃帝使岐伯所以建武揚盛徳風勸戰士也周禮所謂王大捷則令凱樂軍大捷則令凱歌者也漢樂有黃門鼓吹天子所以宴樂羣臣也短簫鐃歌鼓吹之一章亦以賜有功諸侯上畱田地名也其地人有父母死不自白其孤弟者鄰人爲其弟作悲歌以風其兄故曰上畱田曲日重光月重輪羣臣爲漢明帝作也明帝爲太子樂人作歌詩四章以贊太子之德一曰日重光二曰月重輪三曰星重暉四曰海重潤漢末喪亂後二章亡舊說云天子之德光明如日䂓輪如月衆暉如星霑潤如海太子皆比德故云重也橫吹胡樂也博望侯張騫入西域傳其法於西京唯得摩訶兠勒一曲李延年因胡曲更進新聲二十八解乘輿以爲武樂後漢以給邊將軍和帝時萬人將軍得用之魏晉以來二十八解不復俱存見世用黃鵠隴頭出關入關出塞入塞折楊桺覃子赤之陽望行人十曲後漢蔡邕益琴爲九絃鳥獸第四楊白鷢也似鷹而尾上白扶老秃鶖也狀如鶴而大大者頭高八尺善與人鬪好啗蛇鴈自河北渡江南瘦瘠能高飛不畏繒繳江南沃饒每至還河北體肥不能高飛恐爲虞人所獲嘗銜長蘆可數寸以防繒繳鳬鴈在江邉沙上食沙石悉皆消化唯食海蛤不消隨其糞出用以爲藥倍勝常者鶴千歲化爲蒼又千歲變爲黑所謂玄鶴是也猿五百歲爲玃馬自識其駒非其駒則齧殺之驢爲牡馬爲牝則生騾馬爲牡驢爲牝則生􆄄南山有鳥名鷓鴣自呼其名常向日而飛畏霜露早曉稀出有時夜飛飛則以樹葉覆背吳都賦曰鶱翥而翔言飛向南也吐綬鳥一名功曹秦始皇有名馬七一曰追風二曰白兔三曰躡景四曰犇電五曰飛翮六曰銅爵七曰晨鳬鴛鴦水鳥鳬類也雌雄未嘗相離人得其一一思而死故謂之疋鳥也麞有牙而不能噬鹿有角而不能觸麞一名麕靑州人謂麕爲麞兎口有闋尾有九孔雀一名嘉賓言常棲集人家如賓客也鷰一名天女又名曰鷙鳥鵲一名神女鷄一名燭夜鴝鵒一名尸鳩烏一名孝烏一名玄鳥豬一名長喙叅軍羊一名髯鬚主簿狗一名黄耳魚蟲第五螢火一名耀夜一名夜光一名宵燭一名景天一名熠燿一名燐一名丹良鳥腐草化之食蚊蚋蟋蟀一名吟蛩秋初生得寒乃鳴一云濟南謂之懶婦蠅虎蠅狐也形若蜘蛛而色灰白善捕蠅一名蠅蝗一名豹子莎雞一名絡緯一名蟋蟀謂其鳴如紡緯也促織一名投機謂其聲如急織也蚯蚓一名蜿蟺一名曲蟺善長吟於地中江東謂之歌女或曰吟砌蜻蛉一曰蜻蝏一名蝴蝶色靑而大者是也小而黃者曰胡黎一曰胡離小而赤者曰赤卒一名絳騶一名赤衣使者好集水上亦名赤弁丈人蛺蝶一名野蛾一名風蝶江東人謂爲撻末色白背靑者是其有大於蝙蝠者或黑色或靑斑大者曰鳳子一名鳯車亦曰鬼車生江南柑橘園中紺蝶一名蜻蛉似蜻蛉而色玄紺遼東人謂之紺幡亦曰童幡亦曰天雞好以七月連飛闇天海邊蠻夷食之謂海中靑鰕化爲之也魚子一曰鱦亦曰鯤亦曰鮢言如散稻米也蜣蜋一名轉丸一名弄丸能以土包屎轉而成丸圓正無斜角莊周所謂蛣蜣之智於轉丸者也故一名蛣蜣蝸牛跗螺也形如螔蝓魧子一名魚子好羣浮水上曰白萍蝦蟇子一名玄針一名科斗一曰玄魚形圓而尾大尾脫而腳生烏賊一名河伯度事小吏龜一名玄衣督郵鼈一名河伯從事兖州謂赤鯉爲赤謂靑鯉爲靑馬謂黑鯉爲玄駒謂白鯉爲白鯕謂黃鯉爲黃雉江東謂靑衣魚爲婢謂童子魚爲土父謂鼉爲河伯使者結草蟲一名結葦好於草上折屈草葉爲窠窟處處有之螻蛄一名天螻一名􅕪一名鼫䑕有五能而不能成其伎一飛不能過屋二緣不能窮木三泅不能渡谷四穴不能覆身五走不能絶人蝙蝠一名仙䑕一名飛䑕五百歲則色白而腦重集物則頭垂故謂倒挂蝙蝠食之成仙蟚蚏小蟹也生海邊食土一名長卿其有一螯偏大謂之擁劒亦名執火以其螯赤故謂執火也䗅蚑蠨蛸也身小而足長故謂長蚑飛蛾善拂燈燭一名火花一名慕光蝘於甗切蜓大典反又音廷一曰守宫一曰龍子善於樹上捕蟬食之其五色長大者名爲蜥蜴其短而大者名爲蠑螈一曰蛇醫大者長三尺其色玄紺善􆄉人一曰緑螈在壁曰蝘蜓在草曰蜥蜴鯉之大者曰鱣鱧之大者曰鮪鯨海魚也大者長千里小者數丈一生數萬子常以五六月就岸生子至七八月導從其子還大海中鼓浪成雷噴沫成雨水族驚畏一皆逃匿莫敢當者其雌曰鯢大者亦長千里眼爲明月珠古今註卷目卷上輿服第一都邑第二卷中音樂第三鳥獸第四魚蟲第五卷下草木第六雜註第七問答釋義第八題崔豹古今註後古今註三卷晉太傅丞崔豹正熊撰其書七篇雜取古今名物各爲考釋頗爲該極又多異聞孔子曰多識於鳥獸草木之名兹固學者之事有志於博物者於是書宜有取焉豹雖晉文史不著其名氏行事然以族系考之知其爲瑗㚄之後也曩時文昌錫山尤公守當塗刻唐武功蘇鶚衍義十卷後四卷乃誤勦入豹今書然予在册府得本書四卷與豹今所著絕不類嘗以遺同年本郡學錢子敬俾改而正之庶兩書并行不相殽亂予㝷歸蜀不知子敬能從予言否堨灌寧居多暇日因爲檢校牴牾頗爲精善夫昔人著書雖則小道亦無爲無意豈可遽使因循泯滅命工鋟木庶以永其傳云眉山李燾題左史李公守銅梁曰刻崔豹古今註是正已僃予在上饒得郡學本再三叅訂於第四篇以下頗多増改故又刻之䕫門云嘉定庚辰四月望日東徐丁黼謹書
