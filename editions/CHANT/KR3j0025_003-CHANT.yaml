body:
  text: 卷下草木第六甘實形如石榴者謂之壺甘山中有木葉似豫章皮多癬皴名為六駁白楊葉圓青楊葉長柳葉細長栘楊圓葉弱蔕微風大搖一名高飛一名獨搖蒲柳水邊生葉似青楊亦曰蒲楊栘蒲一曰栘柳亦曰栘楊水楊蒲楊也枝勁細紉任矢用赤楊霜降則葉赤材理亦赤合歡樹似梧桐枝弱葉繁互相交結每一風來輒自相解了不相絆綴樹之階庭使人不忿嵇康種之舍前杜仲皮中有絲折之則見木蜜生南方合體皆甜軟皮及葉皆可生啗味如蜜解煩止渴其老枝及根幹堅又可食細碎煮之以為蜜味倍甘美糯棗葉如柿實似柿而小味亦甘美蘇方木出扶南林邑外國取細碎煮之以染瑿木出交州林邑色黑而有文亦謂之文木紫栴木出扶南而色紫亦曰紫檀䝁豆葉似葛實長尺餘可蒸食一名䝁斗貍豆一名貍沙一名獵涉葉似葛而藤大實大如李核可炒食虎豆一名虎沙似貍豆而大實如小兒拳亦可食馬豆一名馬沙似虎豆而枯亦可食荊葵一名茙葵一名芘芣似木槿而光色奪目有紅有紫有青有白有黃莖葉不殊但花色有異耳一曰蜀葵芙蓉一名荷花生池澤中實曰蓮花之最秀異者一名水目一名水芝一名水華色有紅白青黃紅白二色荖多花大者至百葉芡雞頭也一名雁頭一名芰葉似荷而大葉上蹙皺如沸實有芒刺其中如米可以度饑萬連葉如鳥翅一名鳥羽一名鳳翼花大者其色多紅綠紅者紫點綠者紺點俗呼為仙人花一名連纈花酒杯藤出西域藤大如臂葉似葛花實如梧桐實花堅皆可以酌酒自有文章暎徹可愛實大如指味如荳蔻香美消酒土人提酒至藤下摘花酌酒仍以實消酲國人寶之不傳中土張騫至大宛得之漆樹以剛斧斫其皮開以竹管承之汁滴管中即成漆也烏孫國有青田核莫測其樹實之形至中國者但得其核耳核大如六升瓠空之以盛水俄而成酒味甚醇美劉章得兩核集賓客設之常供二十人之飲一核盡一核所盛復飲飲盡隨更注水隨盡隨盛不可久置久置則苦不可飲名曰青田酒枳椇子一名樹蜜一名木餳實形卷曲核在實外味甘美如餳蜜一名白石一名木實一名枳椇棘實曰棗梓實曰豫樟桑實曰椹柘實曰佳匏瓠也壺盧瓠之無柄者也瓠有柄者曰懸瓠可為笙曲沃者尤善秋乃可用用則漆其裏瓢亦瓠也瓠其總瓢其別也空室中無人行則生苔蘚或紫或青名曰圓蘚又曰綠蘚亦曰綠錢稻之黏者為秫禾之黏者為黍亦謂之穄亦曰黃黍九榖者黍稷稻粱三豆二麥是也荼蓼也荼紫色蓼青色其味辛且苦食之明目或謂紫葉者為香荼或謂青葦者為青荼亦以紫色者為紫蓼青色者為青蓼其長大而不苦者為馬蓼蒜卯蒜也俗謂之為小蒜胡國子有蒜十許子共一株二籜幕裹之為名胡蒜尤辛於小蒜俗亦呼之為大蒜揚州土人謂蒻為斑杖不知食之荊州人謂蔖為蕺蘘荷似𦾕苴而白𦾕苴色紫花生根中花未散時可食久置則銷爛不為實矣葉似薑宜陰翳地種之燕支葉似葪花似捕公出西方土人以染名為燕支中國亦謂為紅藍以染粉為婦人色謂為燕支粉今人以重絳為胭肢非燕支花所染也燕支花自為紅藍耳舊謂赤白之間為紅即今所謂紅藍也苦葴一名苦蘵子有裹形如皮弁始生青熟則赤裹正圓如珠子亦隨裹青赤長安兒童謂為洛神珠亦曰王母珠亦曰皮弁草沈釀者漢鄭弘為靈帝文鄉嗇夫行官京洛未至宿一埭埭名沈釀於埭逢故舊友人四顧荒郊村落絕遠酤酒無處情抱不伸乃以錢投十中依評飲盡多酣暢皆得大醉因更為沈釀川明旦分首而去羊躑躅黃花羊食即死見即躑躅不前進雜註第七孫亮竹瑠璃屏風鏤作瑞應圖凡一百二十種魏武帝以瑪瑙石為馬勒以車渠石為酒杯莫難珠一名木難色黃出東夷陽燧以銅為之形如鏡照物則影倒向日則火生以艾炷之則得火長安婦人好盤桓髻到于今其灋不絕墮馬髻今無復作者緌墮髻一云墮馬之餘形也盤龍釵梁冀所製也冀婦改驚翠眉為愁眉魏宮人好畫長眉今人多作蛾眉警鶴髻孫權名舸為赤馬言其飛馳如馬之走陸也又以舟名馳馬曹真有馬名驚帆取其馳驟如烈風之帆舉之疾也魏文帝宮人有絕所寵者有莫瓊樹薛夜來陳尚衣段巧笑四人日夕在側瓊樹乃制蟬鬢縹緲如蟬翼故曰蟬鬢巧笑姑以錦衣絲履作紫粉拂面尚衣能歌舞夜來善為衣裳一時冠絕問答釋義第八程雅問董仲舒曰自古何謂稱三皇五帝對曰三皇三才也五帝五常也三王三明也五霸五嶽也牛亨問曰將離相贈之以芍藥者何也答曰芍藥一名可離故將別以贈之亦猶相招召贈以文無文無一名當歸也欲忘人之憂則贈之以丹棘丹棘一名忘其憂草使人忘其憂也欲蠲人之忿則贈之青堂青堂一名合懽合懽則忘忿程雅問拾櫨木一名無患者昔有神巫名曰寶一本作實眊能符劾百鬼得鬼則以此為棒投之世人相傳以此木為眾鬼所畏競取為器用以却厭邪鬼故號曰無患也牛亨問曰自古有書契以來便應有筆世稱蒙恬造筆何也答曰蒙恬始造即秦筆耳以枯木為管鹿毛為柱羊毫為被所謂蒼毫非兔毫竹管也又問彤管何也曰彤者赤漆耳史官載事故以彤管用赤心記事也孫興公問曰世稱黃帝鍊丹於鑿硯山乃得仙乘龍上天群臣援龍鬚鬚墜而生草曰龍鬚有之乎答曰無也有龍鬚草一名縉雲草故世人為之妄傳至如今有虎鬚草江東亦織以為席號曰西王母席可復是西王母乘虎而墮其鬚也牛亨問曰冕旒以繁露者何也答曰綴玉而下垂如繁露也程雅問曰堯設誹謗之木何也答曰今之華表木也以橫木交柱頭狀若花也形似𣚃槔大路交衢悉施焉或謂之表木以表王者納諫也亦以表識衢路也秦乃除之漢始復修焉今西京謂之交午木牛亨問曰籍者何也答曰籍者尺二竹牒記人之年名字物色縣之宮門案省相應乃得入也程雅問曰凡傳者何也答曰凡傳皆以木為之長尺五寸書符信於上又以一版封之階封以御史印章所以為信也如今之過所也牛亨問曰草木生類乎答曰生類也又曰有識乎答曰無識也又曰無識寧得為生類也答曰物有生而有識者有生而無識者有不生而有識者有不生而無識者夫生而有識者蟲類也生而無識者草木也不生而無識者水土也不生而有識者鬼神也牛亨問曰蟻名玄駒者何也答曰河內人並河而見人馬數千萬皆如黍米遊動往來從旦至暮家人以火燒之人皆是蚊蚋馬皆是大蟻故今人呼蚊蚋為黍民名蟻曰玄駒也牛亨問曰蟬名齊女者何也答曰齊王后忿而死尸變為蟬登庭樹嘒唳而鳴王悔恨故世名蟬曰齊女也
