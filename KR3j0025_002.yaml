body:
  text: 卷中音樂第三雉朝飛者犢木子所作也齊處士泯宣年五十無妻出薪於野見雉雌雄相隨而飛意動心悲乃作雉朝飛之操以自傷焉其聲中絕魏武帝時有盧女者故將軍陰并一本云計之子年七歲入漢宮學琴琴特鳴異於餘伎善為新聲能傳此曲盧女至明帝崩後出嫁為尹更生妻別鶴操高陵牧子所作也娶妻五年而無子父兄為之改娶妻聞之中夜起倚戶而悲嘯牧子聞之愴然而悲歌曰將乖比翼隔天端山川悠遠路漫漫㩜衾不寐食忘餐後人因以為樂章焉走馬引樗里牧恭所作也為父報怨殺人而亡匿於山之下有天馬夜降圍其室而鳴夜覺聞其聲以為吏追乃犇而亡去明旦視之乃天馬跡也因惕然而悟曰吾所處之地將危乎遂荷糧而去入于沂澤中援琴而鼓之而為天馬聲曰走馬引也武溪深馬援為南征之所作援門生爰寄生善吹笛援作歌以和之名曰武溪深其曲曰滔滔武溪一何深鳥飛不度獸不能臨唴哉武溪兮多毒淫淮南王淮南小山之作也王服食求仙徧禮方士遂與八公相攜俱去莫知所往小山之徒思戀不巳乃作小山之曲焉箜篌引朝鮮津卒霍里子高妻麗玉所作也高晨起刺船而濯有一白首狂夫被髮提壺亂河流而渡其妻隨而止之不及遂墮河水死於是援箜篌而鼓之作公無渡河之曲聲甚悽愴曲終自投河而死霍里子高還以其聲語其妻麗玉玉傷之乃引箜篌而寫其聲聞者莫不墮淚飲泣焉麗玉以其曲傳鄰女麗容名之曰箜篌引吳趨曲吳人歌其地也平陵東翟義門人所作也王莽殺義義門人作歌以怨之薤露蒿里並哀歌也出田橫門人橫自殺門人傷之為作悲歌言人命薤上露易晞滅也亦謂人死魂魄歸于蒿里故有二章其一曰薤上朝露何易晞露晞明朝更復落人死一去何時歸其二曰蒿里誰家地聚斂精魄無賢愚鬼伯一何相催促人命不得少踟躕至孝武時李延年乃分二章為二曲薤露送王公貴人蒿里送士大夫庶人使挽柩者歌之世亦呼為挽歌亦謂之長短歌言人壽命長短定分不可妄求也陌上桑出秦氏女子秦氏邯鄲人有女名羅敷為邑人千乘王人妻王人後為趙王家令羅敷出採桑於陌上趙王登臺見而悅之因飲酒欲奪之羅敷乃彈箏作陌上桑之歌以自明焉杞梁妻杞植妻妹朝之所作也植戰死妻曰上則無父中則無夫下則無子人生之苦至矣乃抗聲長哭杞都城感之而頹遂投水而死其姝悲其姊之貞操乃作歌名曰杞梁妻馬梁植字也釣竿伯常子妻所作也伯常子避仇河濱為漁父其妻思之每至河側作釣竿之歌後司馬相如作釣竿之詩今傳為古曲董逃歌後漢游童所作也後漢有董卓作亂率以逃亡後人習之以為歌章樂府奏之以為儆戒焉短簫鐃歌軍樂也黃帝使岐伯所以建武揚盛德風勸戰士也周禮所謂王大捷則令凱樂軍大捷則令凱歌者也漢樂有黃門鼓吹天子所以宴樂群臣也短簫鐃歌鼓吹之一章亦以賜有功諸侯上留田地名也其地人有父母死不自白其孤弟者鄰人為其弟作悲歌以風其兄故曰上留田曲日重光月重輪群臣為漢明帝作也明帝為太子樂人作歌詩四章以贊太子之德一曰日重光二曰月重輪三曰星重暉四曰海重潤漢末喪亂後二章亡舊說云天子之德光明如日規輪如月眾暉如星霑潤如海太子皆比德故云重也橫吹胡樂也博望侯張騫入西域傳其法於西京唯得摩訶兜勒一曲李延年因胡曲更進新聲二十八解乘輿以為武樂後漢以給邊將軍和帝時萬人將軍得用之魏晉以來二十八解不復俱存見世用黃鵠隴頭出關入關出塞入塞折楊柳覃子赤之陽望行人十曲後漢蔡邕益琴為九絃鳥獸第四楊白鷢也似鷹而尾上白扶老禿鶖也狀如鶴而大大者頭高八尺善與人鬭好啗蛇雁自河北渡江南瘦瘠能高飛不畏繒繳江南沃饒每至還河北體肥不能高飛恐為虞人所獲嘗銜長蘆可數寸以防繒繳鳧雁在江邊沙上食沙石悉皆消化唯食海蛤不消隨其糞出用以為藥倍勝常者鶴千歲化為蒼又千歲變為黑所謂玄鶴是也猿五百歲為玃馬自識其駒非其駒則齧殺之驢為牡馬為牝則生騾馬為牡驢為牝則生𩥔南山有鳥名鷓鴣自呼其名常向日而飛畏霜露早曉稀出有時夜飛飛則以樹葉覆背吳都賦曰騫翥而翔言飛向南也吐綬鳥一名功曹秦始皇有名馬七一曰追風二曰白免三曰躡景四曰犇電五曰飛翮六曰銅爵七曰晨鳧鴛鴦水鳥鳧類也雌雄未嘗相離人得其一一思而死故謂之疋鳥也麞有牙而不能噬鹿有角而不能觸麞一名麕青州人謂麕為麞兔口有闋尾有九孔雀一名嘉賓言常棲集人家如賓客也鷰一名天女又名曰鷙鳥鵲一名神女雞一名燭夜鴝鵒一名尸鳩烏一名孝烏一名玄鳥豬一名長喙參軍羊一名髯鬚主簿狗一名黃耳魚蟲第五螢火一名耀夜一名夜光一名宵燭一名景天一名熠燿一名燐一名丹良鳥腐草化之食蚊蚋蟋蟀一名吟蛩秋初生得寒乃鳴一云濟南謂之懶婦蠅虎蠅狐也形若蜘蛛而色灰白善捕蠅一名蠅蝗一名豹子莎雞一名絡緯一名蟋蟀謂其鳴如紡緯也促織一名投機謂其聲如急織也蚯蚓一名蜿蟺一名曲蟺善長吟於地中江東謂之歌女或曰吟砌蜻蛉一曰蜻蝏一名蝴蝶色青而大者是也小而黃者曰胡黎一曰胡離小而赤者曰赤卒一名絳騶一名赤衣使者好集水上亦名赤弁丈人蛺蝶一名野蛾一名風蝶江東人謂為撻末色白背青者是其有大於蝙蝠者或黑色或青斑大者曰鳳子一名鳳車亦曰鬼車生江南柑橘園中紺蝶一名蜻蛉似蜻蛉而色玄紺遼東人謂之紺幡亦曰童幡亦曰天雞好以七月連飛闇天海邊蠻夷食之謂海中青鰕化為之也魚子一曰鱦亦曰鯤亦曰鮢言如散稻米也蜣蜋一名轉丸一名弄丸能以土包屎轉而成丸圓正無斜角莊周所謂蛣蜣之智於轉丸者也故一名蛣蜣蝸牛跗螺也形如螔蝓魧子一名魚子好群浮水上曰白萍蝦蟆子一名玄針一名科斗一曰玄魚形圓而尾大尾脫而腳生烏賊一名河伯度事小吏龜一名玄衣督郵鼈一名河伯從事兗州謂赤鯉為赤驥謂青鯉為青馬謂黑鯉為玄駒謂白鯉為白鯕謂黃鯉為黃雉江東謂青衣魚為婢𩽪謂童子魚為土父謂鼉為河伯使者結草蟲一名結葦好於草上折屈草葉為窠窟處處有之螻蛄一名天螻一名螜一名鼫鼠有五能而不能成其伎一飛不能過屋二緣不能窮木三泅不能渡谷四穴不能覆身五走不能絕人蝙蝠一名仙鼠一名飛鼠五百歲則色白而腦重集物則頭垂故謂倒挂蝙蝠食之成仙蟚蚎小蟹也生海邊食土一名長卿其有一螫偏大謂之擁劍亦名執火以其螫赤故謂執火也䗅蚑蠨蛸也身小而足長故謂長蚑飛蛾善拂燈燭一名火花一名慕光蝘於甗切蜓大典反又音廷一曰守宮一曰龍子善於樹上捕蟬食之其五色長大者名為蜥蜴其短而大者名為蠑螈一曰蛇醫大者長三尺其色玄紺善魅人一曰綠螈在壁曰蝘蜓在草曰蜥蜴鯉之大者曰鱣鱧之大者曰鮪鯨海魚也大者長千里小者數丈一生數萬子常以五六月就岸生子至七八月導從其子還大海中鼓浪成雷噴沫成雨水族驚畏一皆逃匿莫敢當者其雌曰鯢大者亦長千里眼為明月珠水君狀如人乘馬眾魚導從一名魚伯大水有之漢末有人於河際見之人馬皆有鱗甲如大鯉魚但手足耳目鼻與人不異視人良久乃入水
